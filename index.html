<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Bittalk</title>
</head>


<body>

<header class="header">
  <div><strong>Bittalk</strong></div>
  <input class="search" type="search" placeholder="Buscar...">
</header>

<main class="layout">

  <aside class="perfil">
    <img src="https://i.pravatar.cc/40?img=12" alt="">
    <a href="">Perfil</a>
    <a href="">Meus Jogos</a>
    <a href="">Sair</a>
  </aside>

  <section class="feed">

    <article class="post">
      <div class="topo">
        <img src="https://i.pravatar.cc/40?img=1" class="avatar">
        <div>
          <div class="nome">João Silva</div>
          <div class="meta">@joao · 2h</div>
        </div>
      </div>

      <p class="texto">
        Na falta de um controle para console adaptei um pro celular.
      </p>

      <img src="/pexels-ninosouza-2883028.jpg" class="img">
    </article>

  </section>

  <aside class="sidebar">

    <h2 class="titulo">Online</h2>

    <ul class="lista_usuarios">

      <li class="usuario online">
        <img src="https://i.pravatar.cc/40?img=1" class="avatar">
        <div class="info">
          <span class="nome">João</span>
          <span class="status">Jogando Stardew Valley</span>
        </div>
        <span class="indicador"></span>
      </li>

      <li class="usuario online">
        <img src="https://i.pravatar.cc/40?img=2" class="avatar">
        <div class="info">
          <span class="nome">Maria</span>
          <span class="status">Online</span>
        </div>
        <span class="indicador"></span>
      </li>

    </ul>

  </aside>

</main>

<footer class="footer">
  Copyleft 2026 - Bittalk
</footer>

</body>
</html>
